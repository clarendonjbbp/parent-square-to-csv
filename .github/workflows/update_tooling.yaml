name: Update Tooling

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  update-tooling:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update go.mod
        id: update-go
        uses: faisal-memon/update-go-mod-action@v1

      - name: Update golangci-lint references
        id: update-lint
        uses: faisal-memon/update-golangci-lint-action@v1
        with:
          lint-major: "2"
          update-workflow-version: "true"
          update-version-file: "true"
          version-file-path: .tool_versions

      - name: Run lint fix
        if: steps.update-go.outputs.changed == 'true' || steps.update-lint.outputs.changed == 'true'
        run: make lint-fix

      - name: Build pull request body
        if: steps.update-go.outputs.changed == 'true' || steps.update-lint.outputs.changed == 'true'
        run: |
          cp .github/update_tooling_pr_body.md.tmpl "$RUNNER_TEMP/pr_body.md"

          go_line=""
          golangci_action_line=""
          golangci_version_line=""
          lint_fix_line=""

          if [ "${{ steps.update-go.outputs.changed }}" = "true" ]; then
            go_line="- Go version: \`${{ steps.update-go.outputs.previous-version }}\` -> \`${{ steps.update-go.outputs.current-version }}\`"
          fi

          if [ "${{ steps.update-lint.outputs.changed }}" = "true" ]; then
            if [ -n "${{ steps.update-lint.outputs.previous-action-version }}" ] && [ -n "${{ steps.update-lint.outputs.current-action-version }}" ]; then
              golangci_action_line="- golangci-lint-action: \`${{ steps.update-lint.outputs.previous-action-version }}\` -> \`${{ steps.update-lint.outputs.current-action-version }}\`"
            fi
            if [ -n "${{ steps.update-lint.outputs.previous-lint-version }}" ] && [ -n "${{ steps.update-lint.outputs.current-lint-version }}" ]; then
              golangci_version_line="- golangci-lint version: \`${{ steps.update-lint.outputs.previous-lint-version }}\` -> \`${{ steps.update-lint.outputs.current-lint-version }}\`"
            fi
            lint_fix_line="- Ran \`make lint-fix\` after tooling updates"
          fi

          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "pr_body.md"
          text = path.read_text(encoding="utf-8")
          replacements = {
              "{{GO_VERSION_LINE}}": os.environ.get("GO_VERSION_LINE", ""),
              "{{GOLANGCI_ACTION_LINE}}": os.environ.get("GOLANGCI_ACTION_LINE", ""),
              "{{GOLANGCI_VERSION_LINE}}": os.environ.get("GOLANGCI_VERSION_LINE", ""),
              "{{LINT_FIX_LINE}}": os.environ.get("LINT_FIX_LINE", ""),
          }
          for old, new in replacements.items():
              text = text.replace(old, new)

          lines = [line.rstrip() for line in text.splitlines()]
          compact = []
          previous_blank = False
          for line in lines:
              blank = line == ""
              if blank and previous_blank:
                  continue
              compact.append(line)
              previous_blank = blank

          path.write_text("\n".join(compact).strip() + "\n", encoding="utf-8")
          PY
        env:
          GO_VERSION_LINE: ${{ steps.update-go.outputs.changed == 'true' && format('- Go version: `{0}` -> `{1}`', steps.update-go.outputs.previous-version, steps.update-go.outputs.current-version) || '' }}
          GOLANGCI_ACTION_LINE: ${{ steps.update-lint.outputs.previous-action-version != '' && steps.update-lint.outputs.current-action-version != '' && format('- golangci-lint-action: `{0}` -> `{1}`', steps.update-lint.outputs.previous-action-version, steps.update-lint.outputs.current-action-version) || '' }}
          GOLANGCI_VERSION_LINE: ${{ steps.update-lint.outputs.previous-lint-version != '' && steps.update-lint.outputs.current-lint-version != '' && format('- golangci-lint version: `{0}` -> `{1}`', steps.update-lint.outputs.previous-lint-version, steps.update-lint.outputs.current-lint-version) || '' }}
          LINT_FIX_LINE: ${{ steps.update-lint.outputs.changed == 'true' && '- Ran `make lint-fix` after tooling updates' || '' }}

      - name: Create pull request
        if: steps.update-go.outputs.changed == 'true' || steps.update-lint.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          commit-message: Update Go tooling
          title: Update Go tooling
          body-path: ${{ runner.temp }}/pr_body.md
          branch: chore/update-go-tooling
