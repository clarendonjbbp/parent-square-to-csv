name: Update golangci-lint

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * 1"

jobs:
  update-golangci-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update golangci-lint references
        id: update
        uses: faisal-memon/update-golangci-lint-action@main
        with:
          lint-major: "2"
          update-workflow-version: "true"
          update-version-file: "true"
          version-file-path: .golangci-lint-version

      - name: Run lint fix
        if: steps.update.outputs.changed == 'true'
        run: make lint-fix

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          commit-message: Update golangci-lint tooling
          title: Update golangci-lint tooling
          body: |
            Updates the golangci-lint GitHub Action reference and the shared golangci-lint version file.

            Also runs `make lint-fix` after the tooling update.
          branch: chore/update-golangci-lint
